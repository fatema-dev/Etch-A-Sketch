<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Etch a Sketch</title>
		<link rel="stylesheet" href="style.css" />
		<script defer src="script.js"></script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Jersey+10&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h2>Magic</h2>

				<h1>Etch A Sketch</h1>

				<h2>Screen</h2>
			</div>
			<div class="actions">
				<button>Clear</button>
				<button>Reset</button>
				<button>⚫Black Pen</button>
				<button>🎨Random Color pen</button>
			</div>
			<div class="grid"></div>

			<div class="design">
				<div class="circle" style="justify-content: flex-start;"></div>
				<div class="circle" style="justify-content: flex-end;"></div>
			</div>
		</div>
	</body>
</html>
